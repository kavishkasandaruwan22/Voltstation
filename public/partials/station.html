<main class="page">
  <div class="wrap">
    <section class="section">
      <div class="card panel">
        <h2>Charging stations</h2>
        <p class="muted" style="margin-top:8px;">Browse nearby charging points and their current availability.</p>
        <div class="grid grid-2" style="margin-top:16px;">
          <div class="item">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;">
              <div>
                <h3>Green Mile Station</h3>
                <p class="muted">No. 42, Galle Road, Colombo</p>
              </div>
              <span class="badge available">Available</span>
            </div>
            <div class="summary-list">
              <div class="summary-row"><span class="k">Bays</span><span class="v">6</span></div>
              <div class="summary-row"><span class="k">Charger type</span><span class="v">AC / DC</span></div>
            </div>
            <a class="btn secondary" href="/booking" style="margin-top:12px;">Book now</a>
          </div>
          <div class="item">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;">
              <div>
                <h3>Solar Plaza</h3>
                <p class="muted">Kandy Road, Kaduwela</p>
              </div>
              <span class="badge booked">Limited</span>
            </div>
            <div class="summary-list">
              <div class="summary-row"><span class="k">Bays</span><span class="v">4</span></div>
              <div class="summary-row"><span class="k">Charger type</span><span class="v">DC Fast</span></div>
            </div>
            <a class="btn secondary" href="/booking" style="margin-top:12px;">Book now</a>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>
