<main class="page">
  <div class="wrap slim-wrap">
    <section class="page-title">
      <p class="eyebrow">My Bookings</p>
      <h1>Booking history</h1>
      <p class="muted">Review upcoming reservations and past charging bookings.</p>
    </section>

    <section class="section card panel">
      <div class="section-head">
        <div>
          <h2>Upcoming bookings</h2>
          <p class="muted small">Eligible reservations can be cancelled before the slot starts.</p>
        </div>
      </div>
      <div id="upcoming-bookings-list" class="list"></div>
    </section>

    <section class="section card panel">
      <div class="section-head">
        <div>
          <h2>Past bookings</h2>
          <p class="muted small">Completed and cancelled reservations.</p>
        </div>
      </div>
      <div id="past-bookings-list" class="list"></div>
    </section>
  </div>
</main>
