<main class="page">
  <div class="wrap slim-wrap">
    <section class="page-title">
      <p class="eyebrow">Pricing</p>
      <h1>Simple charging prices before you book</h1>
      <p class="muted">Review tomorrow's tariffs, energy forecast, and expected charging prices.</p>
    </section>

    <section class="grid grid-3 tariff-grid" id="tariff-cards"></section>

    <section class="section card panel">
      <div class="section-head">
        <div>
          <h2>Energy Information</h2>
          <p class="muted small">Solar generation, building load, and available charging capacity for tomorrow.</p>
        </div>
      </div>
      <div class="chart-box"><canvas id="energy-chart"></canvas><div id="energy-chart-fallback"></div></div>
      <div class="energy-summary-grid" id="energy-summary-cards"></div>
    </section>

    <section class="section card panel">
      <div class="section-head">
        <div>
          <h2>Tomorrow Charging Price Forecast</h2>
          <p class="muted small">Hourly selling price for tomorrow.</p>
        </div>
      </div>
      <div class="chart-box"><canvas id="price-chart"></canvas><div id="price-chart-fallback"></div></div>
    </section>
  </div>
</main>
