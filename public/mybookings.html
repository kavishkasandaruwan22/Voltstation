<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltStation — My Bookings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F7F5;--panel:#FFF;--ink:#16221F;--muted:#6B756F;--primary:#0E4D52;--accent:#E8A33D;--line:#E4E6E1;--shadow:0 1px 2px rgba(20,34,31,.04),0 8px 24px rgba(20,34,31,.06)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--ink)}
.wrap{max-width:1120px;margin:0 auto;padding:24px}
header{background:var(--panel);border-bottom:1px solid var(--line)}
.topbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:18px 0}
.brand{display:flex;align-items:center;gap:10px;font-family:"Space Grotesk";font-weight:700;font-size:18px}
.nav{display:flex;flex-wrap:wrap;gap:12px}
.nav a{color:var(--muted);text-decoration:none;font-weight:500}
.nav a.active, .nav a:hover{color:var(--primary)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px}
.input{padding:10px 12px;border:1px solid var(--line);border-radius:12px;font-size:14px;width:100%;max-width:260px}
.select{padding:10px 12px;border:1px solid var(--line);border-radius:12px;font-size:14px}
.table{width:100%;border-collapse:collapse}
.table th, .table td{padding:12px 10px;text-align:left;border-bottom:1px solid var(--line)}
.table th{font-size:12px;color:var(--muted);font-weight:600}
.status{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
.status.booked{background:#FFF3D1;color:#A65D09}
.status.charging{background:#DDECF1;color:#15456A}
.status.done{background:#E8F5EB;color:#216B32}
.status.cancelled{background:#FDE8E6;color:#A1271E}
.btn{border:none;border-radius:12px;padding:10px 14px;font-family:"Space Grotesk";font-weight:700;cursor:pointer}
.btn.primary{background:var(--accent);color:#3A2A06}
.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
.empty{color:var(--muted);text-align:center;padding:28px 0}
</style>
</head>
<body>
<header><div class="wrap topbar"><div class="brand"><span class="spark" style="width:24px;height:24px;border-radius:8px;background:radial-gradient(circle at 50% 35%,var(--accent),#C9892B)"></span>VoltStation</div><nav class="nav"><a href="index.html">Home</a><a href="booking.html">Booking</a><a href="details.html">Price Calculation</a><a href="profile.html">User Profile</a><a href="about.html">About Us</a><a id="logoutLink" style="cursor:pointer">Logout</a></nav></div></header>
<div class="wrap">
  <div class="card"><h1 style="margin:0 0 10px;font-family:Space Grotesk">My Bookings</h1><p style="margin:0;color:var(--muted)">Search, filter, cancel or reschedule active bookings.</p></div>
  <div class="card controls"><input class="input" id="search" placeholder="Search bookings" /><select class="select" id="statusFilter"><option value="">All statuses</option><option value="booked">Booked</option><option value="charging">Charging</option><option value="done">Completed</option><option value="cancelled">Cancelled</option></select><select class="select" id="sortBy"><option value="date">Sort by date</option><option value="createdAt">Sort by created</option></select></div>
  <div class="card"><div id="bookingList">Loading bookings…</div></div>
</div>
<script>
const token=localStorage.getItem('vs_token'); if(!token) location.href='login.html';const g=id=>document.getElementById(id);
function authFetch(url, opts={}){opts.headers=Object.assign({},opts.headers,{Authorization:'Bearer '+token});return fetch(url,opts).then(async r=>{if(r.status===401){localStorage.clear();location.href='login.html';throw new Error('unauth')}return r});}
function renderStatus(status){return `<span class="status ${status}">${status}</span>`;}
function renderBookings(list){if(!list.length){g('bookingList').innerHTML='<div class="empty">No bookings found. Book a charging slot to see your activity here.</div>';return;} const rows=list.map(b=>{const duration=b.slotCount && b.slotCount>1?`${b.slotCount} slots`:`${b.slotCount} slot`; const payment=b.status==='done'?'Paid': b.status==='cancelled'?'Refunded':'Pending'; return `<div style="border-bottom:1px solid #F0F0F0;padding:14px 0;display:grid;grid-template-columns:1fr auto;gap:12px"><div><div style="font-weight:700;color:var(--ink)">Booking ${String(b._id).slice(-6)}</div><div style="margin:6px 0;color:var(--muted)">${b.date} · ${b.startTime||''}–${b.endTime||''} · ${duration}</div><div style="font-size:14px;color:var(--ink)"><strong>${b.bayId}</strong> · ${b.type}</div><div style="font-size:14px;color:var(--muted)">Price: Rs ${b.totalCost.toFixed(0)} · ${payment}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px"><button class="btn secondary" data-id="${b._id}" data-action="details">Details</button>${b.status==='booked'||b.status==='charging'?`<button class="btn secondary" data-id="${b._id}" data-action="reschedule">Reschedule</button><button class="btn primary" data-id="${b._id}" data-action="cancel">Cancel</button>`:''}</div></div>`;}).join(''); g('bookingList').innerHTML=rows; document.querySelectorAll('button[data-action]').forEach(btn=>btn.onclick=handleAction);}
async function load(){const params=[]; if(g('statusFilter').value)params.push('status='+encodeURIComponent(g('statusFilter').value)); if(g('search').value)params.push('search='+encodeURIComponent(g('search').value)); if(g('sortBy').value)params.push('sort='+encodeURIComponent(g('sortBy').value)); const q=params.length?'?'+params.join('&'):''; const res=await authFetch('/api/bookings'+q); const data=await res.json(); renderBookings(data); }
async function handleAction(e){const btn=e.currentTarget;const id=btn.dataset.id; const action=btn.dataset.action; if(action==='details'){alert('View details in the Profile or future detail page.'); return;} if(action==='cancel'){if(!confirm('Cancel this booking?'))return; await authFetch('/api/bookings/'+id+'/release',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'cancelled'})}); await load(); return;} if(action==='reschedule'){localStorage.setItem('rescheduleBooking',id); location.href='booking.html?edit='+encodeURIComponent(id);}} 
g('search').oninput=load; g('statusFilter').onchange=load; g('sortBy').onchange=load; document.getElementById('logoutLink').onclick=()=>{if(confirm('Logout?')){localStorage.clear();location.href='login.html';}}; load().catch(()=>g('bookingList').innerHTML='<div class="empty">Could not load bookings.</div>');
</script>
</body>
</html>
